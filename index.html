<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>창고재고관리</title>
  <link rel="apple-touch-icon" href="images/sa-icon-2.jpg">

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "ef0e8e78-9ec6-4e92-8bed-9f1eff07b903",
      });
    });
  </script>

  <style>
    :root{
      --bg:#ffffff;
      --text:#111111;
      --muted:#666666;
      --line:#dddddd;
      --soft:#f7f7f7;
      --card:#ffffff;
      --chip:#f5f5f5;
      --stockbg:#f8f8f8;
      --out:#c63e3e;
      --in:#2563eb;
      --radius:0px;
      --log-cols: 88px 84px 130px 120px 100px;
      --request-cols: 88px 84px 130px 112px 120px 100px;
      --blue:#2563eb;
      --bluebg:#eef4ff;
      --blueLine:#dbeafe;
      --danger:#c63e3e;
      --dangerBg:#fff5f5;
      --dangerLine:#ffefef;
      --saMint:#84cdc9;
      --page-accent:#111111;
      --page-accent-soft:#f7f7f7;
      --header-h:72px;
      --max:1260px;
      --content-max:1040px;
    }

    *{box-sizing:border-box}

    body.preboot #app,
    body.preboot .fab{
      visibility:hidden;
    }

    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.5;
      word-break:keep-all;
    }

    body.mode-request,
    body.mode-list,
    body.mode-admin{
      --page-accent:#111111;
      --page-accent-soft:#f7f7f7;
    }

    .wrap{
      width:min(calc(100% - 64px), var(--content-max));
      margin:0 auto;
      padding:0 0 80px;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:90;
      min-height:64px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      padding:16px 0;
      margin:0 0 42px;
      background:rgb(255, 255, 255);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(0,0,0,0.06);
    }

    .brand{
      color:inherit;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-width:0;
      margin-left:12px;
      font-family:"Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      font-weight:600;
      letter-spacing:-0.02em;
    }

    .brand a{
      color:inherit;
      text-decoration:none;
      min-width:0;
    }

    h1{
      font-size:15px;
      font-weight:500;
      margin:0;
      letter-spacing:-0.02em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .search{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
      margin-left:auto;
      flex:1;
    }

    .search input{
      width:min(200px, 100%);
      height:34px;
      padding:0 12px;
      border:1px solid var(--line);
      border-radius:0;
      outline:none;
      font-size:12px;
      background:#fff;
    }

    .search input:focus{
      border-color:#2a2a2aae;
    }

    .topbarLogo{
      display:none;
      align-items:center;
      justify-content:flex-end;
      margin-left:auto;
      padding-right:16px;
      min-width:120px;
    }

    .topbarLogo.show{ display:flex; }

    .topbarLogo img{
      width:100%;
      max-width:200px;
      height:40px;
      object-fit:contain;
      display:block;
    }

    .pill{
      height:36px;
      padding:0 16px;
      border:1px solid transparent;
      border-radius:0px;
      background:none;
      font-size:12px;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      font-weight:500;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      transition:.2s ease;
    }

    .pill:hover,
    .btn:hover,
    .sheetClose:hover,
    .dangerBtn:hover,
    .authBtn.cancel:hover,
    .stockInlineMini:hover,
    .selDelBtn:hover,
    .miniBtn:hover{
      
      border-color:var(--line);
      background:#292929 !important;
  border-color:#292929 !important;
  color:#fff !important
    }

    .section{ margin-top:34px; }

    .secHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:0 0 18px;
      padding-bottom:10px;
      border-bottom:1px solid rgba(0,0,0,0.08);
    }
.secHeadTitle{
  display:flex;
  align-items:center;
  gap:7px;
  min-width:0;
}

.secHeadAction{
  display:flex;
  align-items:center;
  flex:0 0 auto;
}

.sectionAddBtn{
  background:#84cdc9 !important;
  border-color:#84cdc9 !important;
  color:#fff !important;
}

.sectionAddBtn:hover{
  background:#73c1bc !important;
  border-color:#73c1bc !important;
  color:#fff !important;
}

.sectionAddBtn:active{
  background:#fff !important;
  border-color:#84cdc9 !important;
  color:#84cdc9 !important;
}
}
    .secHead h2{
      margin:0;
      font-size:12px;
      color:var(--muted);
      font-weight:500;
      letter-spacing:0em;
      text-transform:uppercase;
    }

    .list{ display:flex; flex-direction:column; gap:14px; }

    body.mode-request .list,
    body.mode-list .list,
    body.mode-admin .list{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:14px;
    }

    .row{
      display:grid;
      grid-template-columns:minmax(0, 1fr) 150px;
      gap:0;
      align-items:stretch;
    }

    .card{
      border:1px solid var(--line);
      border-right:0;
      border-radius:var(--radius) 0 0 var(--radius);
      background:#fff;
      padding:14px;
      display:flex;
      gap:14px;
      align-items:center;
      min-height:100px;
      cursor:pointer;
      transition:transform .18s ease, border-color .18s ease;
    }

    .card:hover{
      transform:translateY(-2px);
      border-color:#ffffff;
    }

    .card:active{ transform:translateY(0); }

    .thumb{
      width:82px;
      height:82px;
      border-radius:0;
      background:#ffffff;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      overflow:hidden;
      border:1px solid #efefef;
      color:transparent;
      font-size:0;
      line-height:0;
    }

    .thumb img,
    .imgBox img,
    .stockThumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      filter:saturate(.98);
      opacity:0;
      visibility:hidden;
      transition:opacity .15s ease;
    }

    .thumb img.is-loaded,
    .imgBox img.is-loaded,
    .stockThumb img.is-loaded,
    .mainLogoImg.is-loaded{
      opacity:1;
      visibility:visible;
    }

    .meta{ display:flex; flex-direction:column; align-items:flex-start; gap:10px; text-align:left; min-width:0; }
    .meta-top{ width:100%; }

    .meta-bot{
      display:flex;
      align-items:center;
      gap:12px;
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
      min-width:0;
      flex-wrap:wrap;
    }

    .meta-bot span{ white-space:nowrap; }

    .title{
      font-weight:800;
      font-size:18px;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:-0.04em;
      margin-bottom:6px;
    }

    .size{
      font-size:13px;
      color:var(--muted);
      white-space:nowrap;
      font-weight:500;
    }

    .status{ font-weight:600; }
    .status.out{ color:var(--out); }
    .status.in{ color:var(--in); }

    .delta{ white-space:nowrap; font-weight:500; }
    .delta .qty{ font-weight:700; margin-left:6px; }
    .delta .qty.out{ color:var(--out); }
    .delta .qty.in{ color:var(--in); }

    .stock{
      border:1px solid var(--line);
      border-left:1px solid var(--line);
      border-radius:0 var(--radius) var(--radius) 0;
      background:rgba(185, 185, 185, 0.088);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:20px;
      letter-spacing:-0.04em;
      min-height:100px;
    }

    .stock small{
      font-size:14px;
      color:var(--muted);
      font-weight:700;
      margin-left:4px;
    }

    .paper{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:#fff;
      overflow:hidden;
    }

    .paper-head{
      padding:18px 24px;
      border-bottom:1px solid var(--line);
      font-weight:600;
      letter-spacing:0.08em;
      font-size:12px;
      color:var(--muted);
      text-transform:uppercase;
    }

    .paper-body{ padding:28px 24px 24px; }

    .imgRow{
      display:flex;
      justify-content:flex-start;
      gap:20px;
      padding:0 0 24px;
      margin:0;
    }

    .imgBox{
      width:min(100%, 260px);
      aspect-ratio:1 / 1;
      border-radius:0;
      background:#f4f4f4;
      border:1px solid #efefef;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      color:transparent;
      font-size:0;
      line-height:0;
    }

    .imgPh{ width:42px; height:42px; opacity:.55; }

    .itemHeader{ padding:4px 0 0; }

    .itemTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      margin-bottom:20px;
    }

    .itemName{
      font-size:30px;
      font-weight:800;
      letter-spacing:-0.06em;
      line-height:1.04;
      margin:0;
      min-width:0;
      word-break:keep-all;
    }

    .sizePill{
      flex:0 0 auto;
      padding:10px 14px;
      border-radius:999px;
      background:#f7f7f7;
      border:1px solid #ececec;
      color:#111827;
      font-weight:600;
      font-size:13px;
      white-space:nowrap;
      margin-top:3px;
    }

    .statsGrid{ display:grid; grid-template-columns:1fr; gap:10px; margin-top:3px; }

    .statCard{
      border-radius:0;
      border:1px solid var(--line);
      background:#fff;
      padding:0;
      min-height:70px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .statCard.current{ background:#f8f8f8; border-color:var(--line); }

    .statRow{
      width:100%;
      display:grid;
      grid-template-columns:1fr 1fr;
      align-items:center;
      min-height:70px;
    }

    .statLabel,
    .statValue{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:70px;
      min-width:0;
      white-space:nowrap;
      position:relative;
      word-break:keep-all;
      padding:0 6px;
    }

    .statLabel{
      font-size:14px;
      font-weight:600;
      color:#3b3b3b;
      letter-spacing:-0.02em;
    }

    .statLabel .txt{ font-size:15px; line-height:1; white-space:nowrap;  word-break:keep-all;}

    .statValue{
      font-size:18px;
      font-weight:800;
      color:#111;
      letter-spacing:-0.05em;
    }

    .statValue::before{
      content:"";
      position:absolute;
      left:0;
      top:50%;
      transform:translateY(-50%);
      width:1px;
      height:36px;
      background:#d9d9d9;
    }

    .statValue .unit{ font-size:15px; font-weight:800; color:#2f2f2f; margin-left:0; white-space:nowrap;}

    .divider{ height:1px; background:var(--line); margin:28px 0 24px; }

    .boxTitleRow{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:0; margin-bottom:8px; flex-wrap:nowrap; }

    .boxTitle{
      font-size:16px;
      font-weight:600;
      letter-spacing:0em;
      margin:0;
      padding:0;
      color:var(--muted);
      text-transform:uppercase;
      white-space:nowrap;
      word-break:keep-all;
      line-height:1.2;
    }

    .selDelBtn,
    .btn,
    .dangerBtn,
    .stockInlineMini,
    .miniBtn,
    .sheetClose,
    .authBtn{
      padding:0 14px;
      border:1px solid var(--line);
      border-radius:0;
      background:#fff;
      font-weight:500;
      cursor:pointer;
      white-space:nowrap;
      min-width:86px;
      height:34px;
      font-size:12px;
      transition:.2s ease;
    }

    .logBox{
      margin:0;
      border:1px solid var(--line);
      border-radius:0;
      background:#fff;
      overflow-x:auto;
      overflow-y:hidden;
      -webkit-overflow-scrolling:touch;
    }

    .logMinWidth{ min-width:100%; width:100%; }

    .logHead,
    .logRow{
      display:grid;
      grid-template-columns:minmax(120px, 1.15fr) minmax(100px, 0.9fr) minmax(140px, 1.1fr) minmax(140px, 1fr) minmax(110px, 0.8fr);
      align-items:center;
      width:100%;
      column-gap:0;
    }

    .requestTable .logHead,
    .requestTable .logRow{
      grid-template-columns:minmax(120px, 1.1fr) minmax(100px, 0.8fr) minmax(140px, 1.1fr) minmax(120px, 0.95fr) minmax(140px, 1fr) minmax(110px, 0.8fr);
    }

    .logHead > div,
    .logRow > div{ min-width:0; padding:0 18px; }

    .logHead{
      padding:0;
      min-height:52px;
      background:#fafafa;
      border-bottom:1px solid var(--line);
      font-weight:600;
      font-size:12px;
    }

    .logRow{
      padding:0;
      min-height:56px;
      border-top:1px solid var(--line);
      font-size:13px;
      background:#fff;
    }

    .logHeadCell,
    .logDate,
    .logType,
    .logDept,
    .logPerson,
    .logQty{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:52px;
      text-align:center;
    }

    .logHeadLabel{ width:100%; font-size:12px; color:var(--muted); font-weight:600; white-space:nowrap; text-align:center; }

    .logHead .hselect{
      width:100%;
      min-width:0;
      margin:0;
      padding:0 14px;
      text-align:left;
      height:38px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-weight:600;
      font-size:12px;
      outline:none;
    }

    .logHead .hdateWrap{ width:100%; }
    .logHead .hbtn{ width:100%; }
    .logHead .qtySortBtn{ width:100%; display:flex; justify-content:flex-start; align-items:center; }
    .logRow:first-child{ border-top:none; }
    .logRow.clickable{ cursor:pointer; }

    .logRow.selected{ outline:1px solid #111; outline-offset:-1px; background:#fcfcfc; }

    .hbtn{ display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-weight:700; }
    .arrow{ font-size:10px; color:var(--muted); transform:translateY(-0.5px); }

    .hdateWrap{ position:relative; }

    .hdate{
      position:absolute;
      left:0;
      top:44px;
      width:min(92vw, 320px);
      padding:8px;
      border:1px solid var(--line);
      border-radius:0;
      background:#fff;
      display:none;
      z-index:50;
      box-shadow:0 10px 30px rgba(17,24,39,0.08);
    }

    .hdate input{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:9px 10px;
      font-size:12px;
      font-weight:600;
      outline:none;
      background:#fff;
    }

    .hdate .row2{ display:flex; justify-content:flex-end; gap:6px; margin-top:8px; }

    .requestActionWrap{ margin:8px 0 18px; }

    .requestSubmitBtn{
      width:100%;
      padding:15px 16px;
      border:0;
      border-radius:0;
      background:#84cdc9;
      color:#fff;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
      margin-bottom:0;
      transition:opacity .2s ease;
    }

    .requestSubmitBtn:hover,
    .primary:hover,
    .fab:hover,
    .authBtn.confirm:hover{ opacity:.9; }

    .detailPaper.requestDetailPaper{ border-color:#d9d9d9; }

    .detailPaperHead{
      display:grid;
      grid-template-columns:minmax(0, 1fr) 190px;
      align-items:center;
      gap:0;
      min-height:62px;
      padding:0;
      border-bottom:1px solid #dfdfdf;
      background:#fff;
      overflow:hidden;
    }

    .detailPaperHead > span:first-child{ display:none; }
    .detailBrand{ display:none; }

    .detailHeadMeta{
      display:contents;
      min-width:0;
    }

    .detailHeadMeta > div{
      min-height:62px;
      display:flex;
      align-items:center;
      padding:0 22px;
      border-right:1px solid #e5e5e5;
      background:#fff;
      min-width:0;
    }

    .detailHeadMeta .detailHeroLabel{
      display:none;
    }

    .detailHeadMeta .detailHeroName{
      margin:0;
      font-size:20px;
      font-weight:600;
      letter-spacing:-0.04em;
      line-height:1;
      word-break:keep-all;
      justify-content:flex-start;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      color:#111;
    }

    .detailHeadMeta .detailHeroSize{
      margin:0;
      font-size:13px;
      font-weight:500;
      color:#414141d6;
      justify-content:center;
      white-space:nowrap;
    }

    .detailHeadLogo{ display:none; }
    .detailPaperBody{ padding:22px 22px 30px; }
    .detailHeroGrid{ display:none; }
    .detailHeroTop,
    .detailHeroText,
    .detailLogoWrap{ display:none; }

    .detailLogoImage{
      width:100%;
      max-width:92px;
      height:auto;
      object-fit:contain;
      display:block;
    }

    .detailImageFrame{ border:none; border-top:none; padding:22px; }
    .requestImgRow{ justify-content:center; gap:22px; border:none; padding:0; }

    .requestImgBox{
      width:min(100%, 250px);
      aspect-ratio:1 / 1;
      background:#f6f6f3;
      border:1px solid #dfdfdf;
      display:flex;
      align-items:center;
      justify-content:center;
      color:transparent;
      font-size:0;
      line-height:0;
    }

    .requestImgRow .requestImgBox + .requestImgBox{ border-left:1px solid #dfdfdf; padding-left:0; margin-left:0; }
    .requestStatsGrid{ margin-top:24px; }
    .requestStatCard{ border:none; background:#f5f5f5; }
    .requestActionWrapLarge{ margin:18px 0 28px; }
    .detailSectionBlock{ margin-top:28px; }

    .detailSectionHead{ justify-content:space-between; }
    .requestLogBox{ border-color:#d8d8d8; }
    .subtleHead{ background:#f5f5f5; }

    .typeBadge{ font-weight:700; }
    .typeBadge.request{ color:#1f2937; }
    .typeBadge.pending{ color:#9a6700; }
    .typeBadge.approved{ color:#0f766e; }
    .typeBadge.rejected{ color:#b42318; }
    .typeBadge.in{ color:var(--in); }
    .typeBadge.out{ color:var(--out); }

    .filterInlineRow{ display:flex; justify-content:flex-end; gap:10px; margin:0 0 10px; }
    .filterInlineRow.multi{ justify-content:flex-start; flex-wrap:wrap; }

    .filterDateInput,
    .filterSelectInline{ height:34px; border:1px solid var(--line); padding:0 12px; font-size:12px; font-weight:600; background:#fff; }

    .mintBtn{ background:#84cdc9; border-color:#84cdc9; color:#fff; border-radius:0; }
    .mintBtn:hover{ background:#73c1bc; border-color:#73c1bc; }

    .logEmpty{ padding:18px; font-size:13px; color:var(--muted); }

    #bulkDeleteRequests,
    #bulkDeleteLogs{
      background:#292929;
      border-color:#292929;
      color:#fff;
    }

    #bulkDeleteRequests:hover,
    #bulkDeleteLogs:hover{
      background:#1f1f1f;
      border-color:#1f1f1f;
    }

    .reqApproveBtn{
      background:rgba(37, 99, 235, 0.15);
      border-color:rgba(37, 99, 235, 0.35);
      color:#2563eb;
    }

    .reqApproveBtn:hover{
      background:rgba(37, 99, 235, 0.22);
      border-color:rgba(86, 138, 248, 0.45);
      color:#000000;
    }

    .reqRejectBtn{
      background:rgba(198, 62, 62, 0.12);
      border-color:rgba(198, 62, 62, 0.28);
      color:#c63e3e;
    }

    .reqRejectBtn:hover{
      background:rgba(198, 62, 62, 0.18);
      border-color:rgba(198, 62, 62, 0.38);
      color:#b42318;
    }

    #openAdd{
      background:rgba(37, 99, 235, 0.15);
      border-color:rgba(37, 99, 235, 0.35);
      color:#2563eb;
    }

    #openAdd:hover{
      background:rgba(37, 99, 235, 0.22);
      border-color:rgba(37, 99, 235, 0.45);
      color:#1d4ed8;
    }

    .headerFilterDate,
    .headerFilterSelect{
      width:100%;
      min-width:0;
      height:34px;
      border:1px solid var(--line);
      border-radius:0;
      padding:0 10px;
      font-size:12px;
      text-align:center;
      text-align-last:center;
      font-weight:600;

    function loadAllLocal(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return;
        const saved = JSON.parse(raw);
        if(!Array.isArray(saved)) return;

        const firstItem = saved?.[0]?.items?.[0];
        const isNew = !!(firstItem && typeof firstItem === "object" && ("name" in firstItem));

        if(!isNew){
          const byId = new Map();
          for(const sec of saved){
            for(const it of (sec.items||[])){
              byId.set(it.id, it);
            }
          }
          for(const sec of data){
            for(const it of sec.items){
              const s = byId.get(it.id);
              if(s){
                if(typeof s.baseStock === "number") it.baseStock = s.baseStock;
                if(Array.isArray(s.logs)) it.logs = s.logs;
                if(Array.isArray(s.requests)) it.requests = s.requests;
              }
            }
          }
          return;
        }

        const baseIds = new Set();
        for(const sec of data) for(const it of (sec.items||[])) baseIds.add(it.id);

        const savedById = new Map(); 
        for(const sec of saved){
          for(const it of (sec.items||[])){
            savedById.set(it.id, it);
          }
        }

        for(const sec of data){
          for(const it of (sec.items||[])){
            const s = savedById.get(it.id);
            if(s){
              if(typeof s.baseStock === "number") it.baseStock = s.baseStock;
              if(Array.isArray(s.logs)) it.logs = s.logs;
              if(Array.isArray(s.requests)) it.requests = s.requests;
              if(s.img && !it.img) it.img = s.img;
              if(Array.isArray(s.images) && (!it.images || !it.images[0])) it.images = s.images;
            }
          }
        }

        for(const sSec of saved){
          if(!sSec || !sSec.category) continue;
          const cat = String(sSec.category);
          let target = data.find(x => x.category === cat);
          if(!target){
            target = { category: cat, items: [] };
            data.push(target);
          }
          for(const sIt of (sSec.items||[])){
            if(!sIt || !sIt.id) continue;
            if(baseIds.has(sIt.id)) continue;
            target.items.push({
              id: sIt.id,
              name: sIt.name || "(신규)",

              baseStock: Number(sIt.baseStock||0),

              logs: Array.isArray(sIt.logs) ? sIt.logs : [],
              requests: Array.isArray(sIt.requests) ? sIt.requests : []
            });
            baseIds.add(sIt.id);
          }
        }
      }catch(e){}

    function escapeHtml(str){
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(str){
      return escapeHtml(str);

    function isAbsoluteLike(path){
      return /^(https?:)?\/\//i.test(path) || /^data:/i.test(path) || /^blob:/i.test(path) || path.startsWith("/");
    }

    function uniq(arr){
      return [...new Set(arr.filter(Boolean))];
    }

    function getImageCandidates(path){
      const raw = String(path || "").trim();
      if(!raw) return [];
      if(isAbsoluteLike(raw)) return [raw];

      const noHeadSlash = raw.replace(/^\.?\//, "");
      return uniq([
        raw,
        "./" + noHeadSlash,
        "images/" + noHeadSlash,
        "./images/" + noHeadSlash
      ]);
    }

    window.handleImgLoad = function(imgEl){

    window.handleImgError = function(imgEl){
      try{
        const list = JSON.parse(imgEl.dataset.candidates || "[]");
        let idx = Number(imgEl.dataset.idx || "0");
        idx += 1;

        if(idx < list.length){
          imgEl.dataset.idx = String(idx);
          imgEl.classList.remove("is-loaded");
          imgEl.src = list[idx];
          return;
        }

        const fallback = imgEl.dataset.fallback || "";
        if(fallback){

    function statusClass(s){ return s === "입고" ? "in" : "out"; }

    function toISODateLike(d){
      if(!d) return "";
      const raw = String(d).trim();
      if(/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;

      const isoPrefix = raw.match(/^(\d{4}-\d{2}-\d{2})[T\s]/);
      if(isoPrefix) return isoPrefix[1];

      const m = raw.match(/^(\d{1,2})\/(\d{1,2})$/);
      if(m){
        const y = new Date().getFullYear();
        const mm = String(m[1]).padStart(2,"0");
        const dd = String(m[2]).padStart(2,"0");
        return `${y}-${mm}-${dd}`;
      }

      const parsed = new Date(raw);
      if(!Number.isNaN(parsed.getTime())){
        const y = parsed.getFullYear();
        const mm = String(parsed.getMonth() + 1).padStart(2,"0");
        const dd = String(parsed.getDate()).padStart(2,"0");
        return `${y}-${mm}-${dd}`;
      }

      return raw;
    }

    function formatKRDate(d){
      const iso = toISODateLike(d);
      const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if(!m) return iso || "-";
      return `${Number(m[2])}/${Number(m[3])}`;
    }

    function normalizeLog(r){
      const out = { ...r };
      out.d = toISODateLike(out.d);

      if(!out.dept && out.to){
        const parts = String(out.to).split("-").map(s=>s.trim());
        out.dept = parts[0] || out.dept;
        out.person = (parts[1] || "").replace(/^\(|\)$/g,"") || out.person;
      }
      out.t = out.t === "입고" ? "입고" : (out.t === "출고" ? "출고" : "신청");
      out.dept = out.dept || "-";
      out.person = out.person || "";
      out.qty = Number(out.qty || 0);
      if(!out.__key) out.__key = `k_${Date.now()}_${Math.random().toString(16).slice(2)}`;
      return out;
    }

    function ensureLogs(it){
      it.logs = (it.logs || []).map(normalizeLog);
    }

    function ensureRequests(it){
      it.requests = (it.requests || []).map(r => normalizeLog({ ...r, t: "신청" }));
    }

    function countPendingRequests(it){
      ensureRequests(it);
      return (it.requests || []).filter(r => (r.status || "pending") === "pending").length;

    function sortByLatestDateAndKey(rows){
      return [...(rows || [])].sort((a, b) => {
        const ad = String(toISODateLike(a?.d) || "");
        const bd = String(toISODateLike(b?.d) || "");
        if (bd !== ad) return bd.localeCompare(ad);
        const ak = String(a?.__key || "");
        const bk = String(b?.__key || "");
        return bk.localeCompare(ak);
      });
    }

    function signedQty(row){
      const qty = Number(row.qty || 0);
      if (!qty) return 0;
      return row.t === "입고" ? qty : -qty;
    }

    function calcStock(it){
      ensureLogs(it);
      const base = Number(it.baseStock || 0);
      const sum = (it.logs || []).reduce((a, r) => a + signedQty(r), 0);
      return base + sum;
    }

    function getLastLogInfo(it){
      ensureLogs(it);
      if(!it.logs || it.logs.length === 0) return { status:"-", date:"-", delta:0 };
      const sorted = [...it.logs].sort((a,b) => (toISODateLike(b.d)||"").localeCompare(toISODateLike(a.d)||""));
      const r = sorted[0];
      return { status: r.t || "-", date: formatKRDate(r.d), delta: signedQty(r) };
    }

    function flattenItems(){

    async function loadAllFromDB_FORCE(){
      if(!dbReady()) throw new Error("supabaseClient not ready");

      const { data: itemRows, error: e1 } = await supabaseClient
        .from(DB_ITEMS)
        .select("id, base_stock, category, name, size, img, images");
      if(e1) throw e1;

      const { data: logRows, error: e2 } = await supabaseClient
        .from(DB_LOGS)
        .select("item_id, d, t, dept, person, qty, __key");
      if(e2) throw e2;

      let requestRows = [];
      try{
        const { data, error } = await supabaseClient
          .from(DB_REQUESTS)
          .select("id, item_id, department, requester_name, requester_email, qty, status, created_at, item_name, item_size, approved_at, approved_by, processed_log_key");
        if(error) throw error;
        requestRows = data || [];
      }catch(err){
        console.warn("warehouse_requests 테이블 로드 실패:", err);
      }

      const dbItemIds = new Set((itemRows || []).map(r => r.id));
      const logsByItem = new Map();
      const requestsByItem = new Map();

      for(const sec of data){
        sec.items = (sec.items || []).filter(it => {
          if(INITIAL_ITEM_IDS.has(it.id)) return true;
          return dbItemIds.has(it.id);
        });
      }

      for(const row of (itemRows || [])){
        let found = findItemById(row.id);
        if(!found){
          const sec = ensureCategory(row.category || "기타");
          const item = {
            id: row.id,
            category: row.category || "기타",
            name: row.name || row.id,
            size: row.size || "",
            baseStock: Number(row.base_stock || 0),
            img: row.img || null,
            images: Array.isArray(row.images) ? row.images : [row.img || null, null],
            logs: [],
            requests: []
          };
          sec.items.push(item);
          found = { section: sec, it: item };
        }

        const item = found.it;
        const section = found.section;
        item.category = row.category || section.category || item.category || "기타";
        item.name = row.name || item.name || row.id;
        item.size = row.size || item.size || "";
        item.baseStock = Number(row.base_stock || 0);
        item.img = row.img || item.img || null;
        item.images = Array.isArray(row.images) ? row.images : (item.images || [item.img || null, null]);
        if(item.img && (!item.images || !item.images[0])) item.images = [item.img, null];
      }

      for(const r of (logRows || [])){
        if(!logsByItem.has(r.item_id)) logsByItem.set(r.item_id, []);
        logsByItem.get(r.item_id).push(normalizeLog({
          d: r.d,
          t: r.t,
          dept: r.dept,
          person: r.person,
          qty: r.qty,
          __key: r.__key
        }));
      }

      for(const r of (requestRows || [])){
        if(!requestsByItem.has(r.item_id)) requestsByItem.set(r.item_id, []);
        requestsByItem.get(r.item_id).push(normalizeLog({
          d: r.created_at,
          t: "신청",
          dept: r.department,
          person: r.requester_name,
          qty: r.qty,
          __key: `req_${r.id}`,
          _dbid: r.id,
          status: r.status || "pending",
          email: r.requester_email || "",
          approved_at: r.approved_at || "",
          approved_by: r.approved_by || "",
          processed_log_key: r.processed_log_key || ""
        }));
      }

      for(const it of flattenItems()){
        const dbLogs = logsByItem.get(it.id);
        const dbRequests = requestsByItem.get(it.id);
        it.logs = dbLogs || [];
        it.requests = dbRequests || [];
      }

      saveAllLocal();
      DB.mode = "synced";
      DB.lastError = "";
      return true;
    }

    async function decreaseStock(itemId, amount){
      if(!dbReady()) return null;

      const { data, error: readErr } = await supabaseClient
        .from(DB_ITEMS)
        .select("base_stock")
        .eq("id", itemId)
        .single();

      if(readErr) throw readErr;

      const current = Number(data?.base_stock || 0);
      const next = current - Number(amount || 0);

      if(next < 0){
        throw new Error("재고가 부족합니다.");
      }

      const { error: updateErr } = await supabaseClient
        .from(DB_ITEMS)
        .update({ base_stock: next })
        .eq("id", itemId);

      if(updateErr) throw updateErr;
      return next;
    }

    async function updateItemBaseStock(itemId, next){
      const numericNext = Number(next);
      if(!Number.isFinite(numericNext) || numericNext < 0){
        throw new Error("기존재고는 0 이상의 숫자만 입력할 수 있습니다.");
      }

      const found = findItemById(itemId);
      if(found?.it){
        found.it.baseStock = numericNext;
        saveAllLocal();
      }

      if(!dbReady()) return numericNext;

      const { error } = await supabaseClient
        .from(DB_ITEMS)
        .update({ base_stock: numericNext })
        .eq("id", itemId);

      if(error) throw error;
      return numericNext;
    }

      async function submitSignup(){
        const email = getAuthInputValue("signupEmail").toLowerCase();
        const password = getAuthInputValue("signupPassword");
        const confirmPassword = getAuthInputValue("signupPasswordConfirm");

        if(!email || !password || !confirmPassword){
          setAuthError("모든 항목을 입력해주세요.");
          return;
        }

        if(password !== confirmPassword){
          setAuthError("비밀번호가 일치하지 않습니다.");
          return;
        }

        if(password.length < 6){
          setAuthError("비밀번호는 6자 이상 입력해주세요.");
          return;
        }

        if(!supabaseClient){
          setAuthError("회원가입 연결이 준비되지 않았습니다.");
          return;
        }

        const { error } = await supabaseClient.auth.signUp({
          email,
          password
        });

        if(error){
          setAuthError(error.message || "회원가입에 실패했습니다.");
          return;
        }

        setAuthError("회원가입이 완료되었습니다.\n로그인 화면에서 로그인해주세요.");
      }

      document.getElementById("signupSubmitBtn").addEventListener("click", submitSignup);
      document.getElementById("signupBackBtn").addEventListener("click", ()=>{ location.hash = "#/login"; });
      attachAuthEnter(["signupEmail", "signupPassword", "signupPasswordConfirm"], submitSignup);
    }

                      `;
                    }).join("")}
                  </div>
                `
                : `
                  <div class="list">
                    ${filtered.map(it => {
                      const stock = calcStock(it);
                      const last = getLastLogInfo(it);
                      const pendingCount = countPendingRequests(it);
                      const statusText = mode === "admin"
                        ? (pendingCount > 0 ? `신청 ${pendingCount}건` : "대기 없음")
                        : (last.status || "-");
                      const deltaText = mode === "admin"
                        ? (pendingCount > 0 ? "" : (last.date || "-"))
                        : (last.date || "-");
                      const deltaClass = mode === "admin"
                        ? (pendingCount > 0 ? "out" : (last.delta >= 0 ? "in" : "out"))
                        : (last.delta >= 0 ? "in" : "out");
                      const deltaValue = mode === "admin"
                        ? (pendingCount > 0 ? "승인 필요" : `${(last.delta>=0?"+":"")}${(last.delta||0).toLocaleString()}`)
                        : `${(last.delta>=0?"+":"")}${(last.delta||0).toLocaleString()}`;

                                <div class="size">${escapeHtml(it.size || "")}</div>

      ];

        let rows = [...(it.requests || [])];
        if(reqDateFilter) rows = rows.filter(r => toISODateLike(r.d) === reqDateFilter);
        if(reqDeptFilter !== "전체") rows = rows.filter(r => (r.dept || "-") === reqDeptFilter);

          rows = rows.filter(r => (r.status || "pending") !== "approved");
        } else {
          rows = rows.filter(r => (r.status || "pending") === reqStatusFilter);

        return sortByLatestDateAndKey(rows);

                        </select>
                      </div>
                      <div class="logHeadCell"><div class="logHeadLabel">담당자</div></div>
                      <div class="logHeadCell"><div class="logHeadLabel">수량</div></div>
                    </div>
                    ${tableRows(logRows, "log")}
                  </div>
                </div>
                ${isAdmin ? `
                  <div class="adminBottomRow">
                    <div class="adminBottomLeft">
                      <span> </span>
                      <div class="stockInline">
                        <button class="stockInlineValue" id="editBaseStockBtn" type="button">기존재고 <b>${Number(it.baseStock || 0)}</b></button>
                        <div class="stockInlineEdit" id="baseStockEditRow">
                          <input class="stockInlineInput" id="baseStockInput" inputmode="numeric" value="${Number(it.baseStock || 0)}" />
                          <button class="stockInlineMini" id="saveBaseStockBtn" type="button">저장</button>
                          <button class="miniBtn" id="cancelBaseStockBtn" type="button">취소</button>
                        </div>
                      </div>
                    </div>
                    <div class="adminBottomRight"></div>
                  </div>
                  <div class="dangerBox">
                    <div class="dangerText">품목 삭제 시 복구가 어려우니 삭제 전 확인해 주세요.</div>
                    <button class="dangerBtn" id="deleteItemBtn" type="button">품목 제거</button>
                  </div>
                  <div class="dbStatusLine">
                    DB상태: <b>${dbStatusText()}</b>
                    ${DB.mode === "error" && DB.lastError ? `<div style="margin-top:4px;">(${escapeHtml(DB.lastError)})</div>` : ``}
                  </div>
                ` : `
                  <div class="dbStatusLine">DB상태: <b>${dbStatusText()}</b></div>
                `}
              `}
            </div>
          </div>

          <div class="modal" id="addModal" aria-hidden="true">
            <div class="modalOverlay" id="addOverlay"></div>
            <div class="sheet" role="dialog" aria-modal="true" aria-label="${isRequest ? '출고 신청하기' : '추가'}">
              <div class="sheetHead">
                <div>${isRequest ? '출고 신청하기' : '추가'}</div>
                <button class="sheetClose" id="addClose">닫기</button>
              </div>
              <div class="sheetBody">
                <div class="field">
                  <label for="aDate">날짜</label>
                  <input type="date" id="aDate">
                </div>
                ${isRequest ? `<input type="hidden" id="aType" value="신청">` : `
                  <div class="field">
                    <label>구분</label>
                    <input type="hidden" id="aType" value="출고">
                    <div class="seg" id="aTypeSeg">
                      <button type="button" class="active out" data-v="출고">출고</button>
                      <button type="button" class="in" data-v="입고">입고</button>
                    </div>
                  </div>
                `}
                <div class="field">
                  <label for="aDept">부서</label>
                  <select id="aDept">
                    ${allDepts.map(d => `<option value="${escapeAttr(d)}">${escapeHtml(d)}</option>`).join("")}
                  </select>
                </div>
                <div class="field">
                  <label for="aQty">수량</label>
                  <input id="aQty" inputmode="numeric" placeholder="예) 100" />
                </div>
                <div class="field">
                  <label for="aPerson">담당자</label>
                  <input id="aPerson" placeholder="000선임" />
                </div>
              </div>
              <div class="sheetFoot">
                <button class="btn primary" id="addBtn">${isRequest ? '출고 신청하기' : '추가'}</button>
              </div>
            </div>
          </div>
        `;

        const reqDateFilterEl = app.querySelector("#reqDateFilter");
        const reqDeptSel = app.querySelector("#reqDeptSel");
        const reqStatusSel = app.querySelector("#reqStatusSel");
        const logDateFilterEl = app.querySelector("#logDateFilter");
        const logTypeSel = app.querySelector("#logTypeSel");
        const logDeptSel = app.querySelector("#logDeptSel");
        const openAdd = app.querySelector("#openAdd");
        const openRequestBtn = app.querySelector("#openRequestBtn");
        const addModal = app.querySelector("#addModal");
        const addOverlay = app.querySelector("#addOverlay");
        const addClose = app.querySelector("#addClose");
        const addBtn = app.querySelector("#addBtn");
        const aPersonInput = app.querySelector("#aPerson");
        const aType = app.querySelector("#aType");
        const seg = app.querySelector("#aTypeSeg");

        if(reqDateFilterEl){
          reqDateFilterEl.addEventListener("change", (e)=>{
            reqDateFilter = e.target.value || "";
            render();
          });
        }
        if(reqDeptSel){
          reqDeptSel.addEventListener("change", (e)=>{
            reqDeptFilter = e.target.value || "전체";
            render();
          });
        }
        if(reqStatusSel){
          reqStatusSel.addEventListener("change", (e)=>{
            reqStatusFilter = e.target.value || "전체";
            render();
          });
        }
        if(logDateFilterEl){
          logDateFilterEl.addEventListener("change", (e)=>{
            logDateFilter = e.target.value || "";
            render();
          });
        }
        if(logTypeSel){
          logTypeSel.addEventListener("change", (e)=>{
            logTypeFilter = e.target.value;
            render();
          });
        }
        if(logDeptSel){
          logDeptSel.addEventListener("change", (e)=>{
            logDeptFilter = e.target.value;
            render();
          });
        }

        app.querySelectorAll("[data-row]").forEach(row => {
          row.addEventListener("click", ()=>{
            const key = row.dataset.row;
            const kind = row.dataset.kind;
            const targetSet = kind === "request" ? selectedRequestKeys : selectedLogKeys;
            if(targetSet.has(key)) targetSet.delete(key);
            else targetSet.add(key);
            render();
          });
        });

        const approveRequestsBtn = app.querySelector("#approveRequestsBtn");
        if(approveRequestsBtn){
          approveRequestsBtn.addEventListener("click", async ()=>{
            const rows = (it.requests || []).filter(r => selectedRequestKeys.has(r.__key));
            const pendingRows = rows.filter(r => (r.status || "pending") === "pending");
            if(pendingRows.length === 0){
              alert("승인할 요청 내역을 선택해주세요.");
              return;
            }

            const approverEmail = await getCurrentUserEmail();

            try{
              for(const r of pendingRows){
                if(!r._dbid){
                  throw new Error("DB 요청 ID가 없습니다.");
                }
                await approveRequestByRpc(r._dbid, approverEmail || "");
              }

              await maybePromptOneSignalPermission();
              await loadAllFromDB_FORCE();
              selectedRequestKeys.clear();
              render();
            }catch(err){
              console.error(err);
              alert("요청 승인 반영 실패: " + (err?.message || err));
              DB.mode = "error";
              DB.lastError = String(err?.message || err);
            }
          });
        }

        const rejectRequestsBtn = app.querySelector("#rejectRequestsBtn");
        if(rejectRequestsBtn){
          rejectRequestsBtn.addEventListener("click", async ()=>{
            const rows = (it.requests || []).filter(r => selectedRequestKeys.has(r.__key));
            const pendingRows = rows.filter(r => (r.status || "pending") === "pending");
            if(pendingRows.length === 0){
              alert("반려할 요청 내역을 선택해주세요.");
              return;
            }

            const approverEmail = await getCurrentUserEmail();

            try{
              for(const r of pendingRows){
                if(!r._dbid){
                  throw new Error("DB 요청 ID가 없습니다.");
                }
                await rejectRequestByRpc(r._dbid, approverEmail || "");
              }

              await loadAllFromDB_FORCE();
              selectedRequestKeys.clear();
              render();
            }catch(err){
              console.error(err);
              alert("요청 반려 반영 실패: " + (err?.message || err));
              DB.mode = "error";
              DB.lastError = String(err?.message || err);
            }
          });
        }

        const bulkDeleteRequests = app.querySelector("#bulkDeleteRequests");
        if(bulkDeleteRequests){
          bulkDeleteRequests.addEventListener("click", async ()=>{
            if(selectedRequestKeys.size === 0){
              alert("삭제할 신청 내역을 선택해주세요.");
              return;
            }
            const rowsToDelete = (it.requests || []).filter(r => selectedRequestKeys.has(r.__key));
            it.requests = (it.requests || []).filter(r => !selectedRequestKeys.has(r.__key));
            selectedRequestKeys.clear();
            saveAllLocal();
            try{
              await deleteRequestsByKeys(it.id, rowsToDelete);
            }catch(err){
              console.error(err);
              alert("DB에서 신청 내역 삭제에 실패했습니다.");
            }
            render();
          });
        }

        const bulkDeleteLogs = app.querySelector("#bulkDeleteLogs");
        if(bulkDeleteLogs){
          bulkDeleteLogs.addEventListener("click", async ()=>{
            if(selectedLogKeys.size === 0){
              alert("삭제할 내역을 선택해주세요.");
              return;
            }
            const keys = Array.from(selectedLogKeys);
            it.logs = (it.logs || []).filter(r => !selectedLogKeys.has(r.__key));
            selectedLogKeys.clear();
            saveAllLocal();
            try{
              await deleteLogsByKeys(it.id, keys);
            }catch(err){
              console.error(err);
              alert("DB에서 내역 삭제에 실패했습니다.");
            }
            render();
          });
        }

        if(isAdmin){
          const deleteItemBtn = app.querySelector("#deleteItemBtn");
          if(deleteItemBtn) deleteItemBtn.addEventListener("click", handleDeleteItem);

          const editBaseStockBtn = app.querySelector("#editBaseStockBtn");
          const baseStockEditRow = app.querySelector("#baseStockEditRow");
          const baseStockInput = app.querySelector("#baseStockInput");
          const saveBaseStockBtn = app.querySelector("#saveBaseStockBtn");
          const cancelBaseStockBtn = app.querySelector("#cancelBaseStockBtn");

          function openBaseStockEditor(){
            if(!baseStockEditRow || !baseStockInput) return;
            baseStockEditRow.classList.add("show");
            baseStockInput.value = String(Number(it.baseStock || 0));
            requestAnimationFrame(()=>{
              baseStockInput.focus();
              baseStockInput.select();
            });
          }

          function closeBaseStockEditor(){
            if(!baseStockEditRow || !baseStockInput) return;
            baseStockEditRow.classList.remove("show");
            baseStockInput.value = String(Number(it.baseStock || 0));
          }

          if(editBaseStockBtn){
            editBaseStockBtn.addEventListener("click", (e)=>{
              e.preventDefault();
              e.stopPropagation();
              openBaseStockEditor();
            });
          }

          if(cancelBaseStockBtn){
            cancelBaseStockBtn.addEventListener("click", (e)=>{
              e.preventDefault();
              e.stopPropagation();
              closeBaseStockEditor();
            });
          }

          if(saveBaseStockBtn){
            saveBaseStockBtn.addEventListener("click", async (e)=>{
              e.preventDefault();
              e.stopPropagation();

              const next = Number((baseStockInput?.value || "").trim());
              if(!Number.isFinite(next) || next < 0){
                alert("기존재고는 0 이상의 숫자만 입력해주세요.");
                return;
              }

              try{
                await updateItemBaseStock(it.id, next);
                await loadAllFromDB_FORCE();
                closeBaseStockEditor();
                render();
              }catch(err){
                console.error(err);
                alert("기존재고 저장 실패: " + (err?.message || err));
                DB.mode = "error";
                DB.lastError = String(err?.message || err);
              }
            });
          }

          if(baseStockInput){
            baseStockInput.addEventListener("keydown", async (e)=>{
              if(e.key === "Enter"){
                e.preventDefault();
                saveBaseStockBtn?.click();
              }
              if(e.key === "Escape"){
                e.preventDefault();
                closeBaseStockEditor();
              }
            });
          }
        }

        function openAddModal(){
          addModal.classList.add("show");
          document.body.style.overflow = "hidden";
          const aDate = app.querySelector("#aDate");
          if(aDate && !aDate.value) aDate.value = getToday();
        }

        function closeAddModal(){
          addModal.classList.remove("show");
          document.body.style.overflow = "";
        }

        if(openAdd) openAdd.addEventListener("click", openAddModal);
        if(openRequestBtn) openRequestBtn.addEventListener("click", openAddModal);
        addOverlay.addEventListener("click", closeAddModal);
        addClose.addEventListener("click", closeAddModal);

        if(aPersonInput){
          aPersonInput.addEventListener("blur", ()=> setNameTitleIfNeeded(aPersonInput));
        }

        if(seg && aType){
          function setType(v){
            aType.value = v;
            seg.querySelectorAll("button").forEach(b => {
              const on = b.dataset.v === v;
              b.classList.toggle("active", on);
              b.classList.toggle("out", b.dataset.v === "출고");
              b.classList.toggle("in", b.dataset.v === "입고");
            });
          }
          seg.querySelectorAll("button").forEach(b => b.addEventListener("click", ()=> setType(b.dataset.v)));
        }

        addBtn.addEventListener("click", async ()=>{
          const d = app.querySelector("#aDate").value;
          const dept = app.querySelector("#aDept").value;
          const person = (app.querySelector("#aPerson").value || "").trim();
          const qty = Number((app.querySelector("#aQty").value || "").trim());
          const t = isRequest ? "신청" : app.querySelector("#aType").value;

          if(!d){ alert("날짜를 선택해주세요."); return; }
          if(!Number.isFinite(qty) || qty <= 0){ alert("수량은 0보다 큰 숫자여야 합니다."); return; }

          const row = normalizeLog({ d, t, dept, person: person || "(입력)", qty });

          try{
            if(isRequest){
              it.requests = it.requests || [];
              it.requests.push(row);
              saveAllLocal();
              const inserted = await addRequestToDB(it, row);
              if(inserted?.id){
                row._dbid = inserted.id;
                row.__key = `req_${inserted.id}`;
              }
              if(inserted?.created_at) row.d = inserted.created_at;
              alert(`신청이 접수되었습니다. 재고는 관리자 반영 후 변경됩니다.`);
            }else{
              it.logs = it.logs || [];
              it.logs.push(row);
              saveAllLocal();
              await addLogToDB(it.id, row);
            }
          }catch(err){
            console.error(err);
            alert(isRequest
              ? `신청 저장 실패: ${err?.message || err}`
              : `DB 저장 실패: ${err?.message || err}`);
            DB.mode = "error";
            DB.lastError = String(err?.message || err);
          }

          app.querySelector("#aQty").value = "";
          app.querySelector("#aPerson").value = "";
          closeAddModal();
          render();
        });
      }

      async function handleDeleteItem(){
        const itemName = (it.name || "해당 품목");
        const ok = confirm(`정말 "${itemName}" 품목을 삭제하시겠습니까?`);
        if(!ok) return;

        removeItemLocal(it.id);

        try{
          await deleteItemFromDB(it.id);
        }catch(err){
          console.error(err);
          alert(`DB에서 품목 삭제에 실패했습니다. (로컬에서는 삭제됨)\n권한/RLS 설정을 확인해주세요.`);
          DB.mode = "error";
          DB.lastError = String(err?.message || err);
        }

        q.value = "";
        location.hash = "#/admin";
        router();
      }

      render();
    }

    async function updateFabVisibility(){
      const hash = location.hash || "#/login";
      const hideFab = ["#/login", "#/signup", "#/find-id", "#/reset-password", "#/"] .includes(hash)
        || hash === "#/admin"
        || /^#\/admin\//.test(hash)
        || hash === "#/list"
        || /^#\/list\//.test(hash);

      if(fabAddItem){
        fabAddItem.style.display = hideFab ? "none" : "";
      }
    }

    async function router(){
      await updateFabVisibility();

      const hash = location.hash || "#/login";
      const isPublicAuthPage = ["#/login", "#/signup", "#/find-id", "#/reset-password"].includes(hash);

      if(!isHomeLoggedIn() && !isPublicAuthPage){
        location.hash = "#/login";
        return;
      }

      const requestItem = hash.match(/^#\/request\/item\/(.+)$/);
      const adminItem = hash.match(/^#\/admin\/item\/(.+)$/);
      const listItem = hash.match(/^#\/list\/item\/(.+)$/);

      if(hash === "#/login"){
        renderLoginPage();
      }else if(hash === "#/signup"){
        renderSignupPage();
      }else if(hash === "#/find-id"){
        renderFindIdPage();
      }else if(hash === "#/reset-password"){
        renderResetPasswordPage();
      }else if(hash === "#/" || hash === ""){
        await renderMainHome();
      }else if(hash === "#/request"){
        renderHome("request");
      }else if(hash === "#/list"){
        renderHome("list");
      }else if(hash === "#/admin"){
        const ok = await isAdminUser();
        if(!ok){
          alert("관리자 권한이 없습니다.");
          location.hash = "#/";
          return;
        }
        renderHome("admin");
      }else if(requestItem){
        renderDetail(decodeURIComponent(requestItem[1]), "request");
      }else if(adminItem){
        const ok = await isAdminUser();
        if(!ok){
          alert("관리자 권한이 없습니다.");
          location.hash = "#/";
          return;
        }
        renderDetail(decodeURIComponent(adminItem[1]), "admin");
      }else if(listItem){
        renderDetail(decodeURIComponent(listItem[1]), "list");
      }else{
        await renderMainHome();
      }
    }

    function openItemModal(prefillCategory){
      itemModal.classList.add("show");
      document.body.style.overflow = "hidden";
      if(prefillCategory) nCategory.value = prefillCategory;
      if(!nBase.value) nBase.value = "1000";
      setTimeout(()=>{ (nName.value ? nSize : nName).focus(); }, 30);
    }

    function closeItemModal(){
      itemModal.classList.remove("show");
      document.body.style.overflow = "";
    }

    function getToday(){
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function setNameTitleIfNeeded(input){
      if(!input) return;
      input.value = (input.value || "").trim();
    }

    fabAddItem.addEventListener("click", ()=> openItemModal(""));
    itemOverlay.addEventListener("click", closeItemModal);
    itemClose.addEventListener("click", closeItemModal);

    createItemBtn.addEventListener("click", async ()=>{
      const category = (nCategory.value || "").trim();
      const name = (nName.value || "").trim();
      const size = (nSize.value || "").trim();
      const base = Number(String(nBase.value || "").replace(/,/g,""));
      const img  = (nImg.value || "").trim();

      if(!category){ alert("카테고리를 입력해주세요."); return; }
      if(!name){ alert("품목명을 입력해주세요."); return; }
      if(!Number.isFinite(base) || base < 0){ alert("기준재고는 0 이상 숫자여야 합니다."); return; }

      const sec = ensureCategory(category);
      if(!sec){ alert("카테고리 생성에 실패했습니다."); return; }

      const baseId = slugifyId(`${category}-${name}-${size}`);
      let id = baseId;
      let n = 2;
      while(findItemById(id)){
        id = `${baseId}-${n++}`;
      }

      const newItem = {
        id,
        name,
        size,
        baseStock: base,
        img: img || null,
        images: [img || null, null],
        logs: [],
        requests: []
      };

      sec.items = sec.items || [];
      sec.items.push(newItem);

      saveAllLocal();

      try{
        await saveItemToDB(newItem, category);
      }catch(err){
        console.error(err);
        DB.mode = "error";
        DB.lastError = String(err?.message || err);
        alert("품목은 추가되었지만 DB 저장에 실패했습니다. (로컬에는 저장됨)\n권한/RLS 설정을 확인해주세요.");
      }

      nCategory.value = "";
      nName.value = "";
      nSize.value = "";
      nBase.value = "";
      nImg.value = "";

      closeItemModal();

      q.value = "";
      location.hash = "#/admin";
      router();
    });

    doSearch.addEventListener("click", async ()=>{
      const hash = location.hash || "#/";
      if(hash === "#/admin"){
        const ok = await isAdminUser();
        if(!ok){
          alert("관리자 권한이 없습니다.");
          location.hash = "#/";
          return;
        }
        renderHome("admin");
      }else if(hash === "#/list"){
        renderHome("list");
      }else{
        renderHome("request");
      }
    });

    q.addEventListener("keydown", async (e)=>{
      if(e.key === "Enter"){
        const hash = location.hash || "#/";
        if(hash === "#/admin"){
          const ok = await isAdminUser();
          if(!ok){
            alert("관리자 권한이 없습니다.");
            location.hash = "#/";
            return;
          }
          renderHome("admin");
        }else if(hash === "#/list"){
          renderHome("list");
        }else{
          renderHome("request");
        }
      }
    });

    q.addEventListener("input", async ()=>{
      const hash = location.hash || "#/";
      if(hash === "#/admin"){
        const ok = await isAdminUser();
        if(!ok){
          location.hash = "#/";
          return;
        }
        renderHome("admin");
      }else if(hash === "#/list"){
        renderHome("list");
      }else if(hash === "#/request"){
        renderHome("request");
      }
    });

    homeLink.addEventListener("click", (e)=>{
      e.preventDefault();
      q.value = "";
      location.hash = "#/";
    });
    
    navBack?.addEventListener("click", ()=>{
  history.back();
});

navForward?.addEventListener("click", ()=>{
  history.forward();
});

navHome?.addEventListener("click", ()=>{
  q.value = "";
  location.hash = "#/";
});

navReload?.addEventListener("click", ()=>{
  location.reload();
});

    window.addEventListener("hashchange", router);

    (async function boot(){
      loadAllLocal();

      if(!location.hash) location.hash = "#/login";

      renderLoginPage(); 
      document.body.classList.remove("preboot");

      const ok = initSupabase();
      if(!ok){
        DB.mode = "local";
        return;
      }

      try{
        await syncHomeLoginSessionFromSupabase();
        await loadAllFromDB_FORCE();
      }catch(err){
        console.error("DB 로드 실패:", err);
        DB.mode = "error";
        DB.lastError = String(err?.message || err);
      }

      supabaseClient.auth.onAuthStateChange((event, session) => {
        setHomeLoggedIn(!!session);
        const authHashes = ["#/login", "#/signup", "#/find-id", "#/reset-password"];
        if(session && authHashes.includes(location.hash || "#/login")){
          location.hash = "#/";
          return;
        }
        if(!session && !authHashes.includes(location.hash || "#/login")){
          location.hash = "#/login";
        }
      });

      startRealtime();
      router();
    })();
  </script>
</body>
</html>
